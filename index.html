<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>Minecraft Server</title>
<meta name="description" content="A 30-Years Project <3">
<meta property="og:title" content="Fidelity SMP">
<meta property="og:description" content="A 30-Years Project <3">
<meta property="og:image" content="https://i.ibb.co/S4MpvMYn/mclogo.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Fidelity SMP">
<meta name="twitter:description" content="A 30-Years Project <3">
<meta name="twitter:image" content="https://i.ibb.co/S4MpvMYn/mclogo.png">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;padding:20px;background:#0d0f12 url('wallpaper.avif') center/cover no-repeat}
.mc-card{max-width:380px;width:100%;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.25);border-radius:16px;overflow:hidden}
.mc-head{padding:18px 20px 14px;display:flex;gap:12px;align-items:flex-start}
.mc-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.08) url('servericon.avif') center/cover no-repeat}
.mc-hinfo{flex:1;min-width:0}
.mc-name{font-size:1.1em;font-weight:700;color:#fff;margin:0 0 4px}
.mc-desc{font-size:.85em;color:rgba(255,255,255,.5);margin:0 0 10px;line-height:1.45}
.mc-addr{font-size:.92em;color:rgba(255,255,255,.6);font-family:monospace;background:rgba(255,255,255,.05);display:block;padding:8px 12px;border-radius:9px;margin-bottom:14px;cursor:pointer;transition:background .15s;user-select:none;border:1px solid rgba(255,255,255,.08)}
.mc-addr:hover{background:rgba(255,255,255,.1)}
.mc-addr.cp{color:#7ee87a;border-color:rgba(98,210,88,.3)}
.mc-acts{display:flex;gap:6px;flex-wrap:wrap}
.mc-bbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:12px;font-size:.85em;font-weight:600;text-decoration:none;cursor:pointer;border:1px solid rgba(98,210,88,.3);background:rgba(98,210,88,.08);color:#7ee87a;transition:background .18s,transform .15s;flex:1;justify-content:center}
.mc-bbtn:hover{background:rgba(98,210,88,.16);transform:translateY(-1px)}
.mc-shr{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);cursor:pointer;transition:background .18s,transform .15s;flex-shrink:0}
.mc-shr:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.mc-shr svg{width:18px;height:18px;stroke:#fff}
.mc-note{padding:10px 20px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:.78em;color:rgba(255,255,255,.4);line-height:1.5}
</style>
</head>
<body>
<div class="mc-card">
  <div class="mc-head">
    <div class="mc-thumb"></div>
    <div class="mc-hinfo">
      <div class="mc-name" id="mc-name"></div>
      <div class="mc-desc" id="mc-desc"></div>
      <div class="mc-addr" id="mc-addr"></div>
      <div class="mc-acts">
        <a class="mc-bbtn" id="mc-join" href="#">Add to Minecraft</a>
        <!-- FIX: share button now exists in HTML with correct id -->
        <div class="mc-shr" id="mc-share" title="Share">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
  <div class="mc-note">Tap the button above to add the server directly to Minecraft Bedrock!</div>
</div>

<script>
const SN = 'Fidelity SMP [Bedrock Edition]';
const SU = 'fidelity.minecraft.casa';
const SP = '25711';
const SD = 'A 30-Years Project <3';

const URI = `minecraft:?addExternalServer=${encodeURIComponent(SN)}|${SU}:${SP}`;

document.title = SN;
document.getElementById('mc-name').textContent = SN;
document.getElementById('mc-desc').textContent = SD;

const joinBtn = document.getElementById('mc-join');
joinBtn.href = URI;

// Copy address to clipboard on click
const addrEl = document.getElementById('mc-addr');
addrEl.textContent = `${SU}:${SP}`;
addrEl.onclick = () => {
  navigator.clipboard.writeText(`${SU}:${SP}`).then(() => {
    addrEl.classList.add('cp');
    addrEl.textContent = 'Copied!';
    setTimeout(() => {
      addrEl.classList.remove('cp');
      addrEl.textContent = `${SU}:${SP}`;
    }, 1500);
  });
};

// FIX: share button element now exists, so this no longer throws
document.getElementById('mc-share').onclick = () => {
  if (navigator.share) {
    navigator.share({ text: `Join my Minecraft server at ${window.location.href}` });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('Link copied!');
  }
};

// Auto-trigger the minecraft: URI on page load (works on mobile)
window.location.href = URI;
</script>
</body>
</html>
